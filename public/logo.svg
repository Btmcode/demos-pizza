<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 64" role="img" aria-label="Demos Pizza">
  <defs>
    <linearGradient id="dpYellow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFC400"/>
      <stop offset="100%" stop-color="#FFB300"/>
    </linearGradient>
    <linearGradient id="dpPink" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FF4FA3"/>
      <stop offset="100%" stop-color="#FF2D8D"/>
    </linearGradient>
  </defs>
  <!-- Black background plate -->
  <rect x="0" y="0" width="280" height="64" rx="10" fill="#111111"/>
  <!-- Yellow emblem: pizza slice -->
  <g transform="translate(8,8)">
    <circle cx="24" cy="24" r="22" fill="none" stroke="url(#dpYellow)" stroke-width="1.5"/>
    <path d="M24 6 L 38 36 L 10 36 Z" fill="url(#dpYellow)"/>
    <circle cx="20" cy="26" r="2.2" fill="#FFFFFF"/>
    <circle cx="27" cy="29" r="1.8" fill="#FFFFFF"/>
    <circle cx="24" cy="20" r="1.4" fill="#FFFFFF"/>
    <circle cx="19" cy="32" r="1.4" fill="#FF2D8D"/>
    <circle cx="29" cy="32" r="1.2" fill="#FF2D8D"/>
    <path d="M24 4 C 22 6, 22 8, 24 9 C 26 8, 26 6, 24 4 Z" fill="#16A34A"/>
  </g>
  <!-- Wordmark -->
  <text x="62" y="35" font-family="'Space Grotesk', 'Inter', sans-serif" font-size="26" font-weight="700" fill="url(#dpPink)" letter-spacing="-0.5">DEMO'S</text>
  <text x="178" y="35" font-family="'Space Grotesk', 'Inter', sans-serif" font-size="26" font-weight="700" fill="url(#dpYellow)" letter-spacing="-0.5">PIZZA</text>
  <!-- Tagline -->
  <text x="62" y="52" font-family="'Inter', sans-serif" font-size="9" font-weight="500" fill="#FFC400" letter-spacing="2.5" opacity="0.85">TAZE MALZEME · EL YAPIMI HAMUR</text>
</svg>
