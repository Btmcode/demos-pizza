<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 64" role="img" aria-label="Demos Pizza">
  <defs>
    <linearGradient id="dpGold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFD700"/>
      <stop offset="50%" stop-color="#FFC107"/>
      <stop offset="100%" stop-color="#B8860B"/>
    </linearGradient>
    <linearGradient id="dpPink" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FF4081"/>
      <stop offset="100%" stop-color="#E91E63"/>
    </linearGradient>
  </defs>
  <!-- Black background plate -->
  <rect x="0" y="0" width="260" height="64" rx="6" fill="#1A1410"/>
  <!-- Gold emblem: pizza slice -->
  <g transform="translate(8,8)">
    <circle cx="24" cy="24" r="22" fill="none" stroke="url(#dpGold)" stroke-width="1.5"/>
    <!-- Pizza slice shape -->
    <path d="M24 6 L 38 36 L 10 36 Z" fill="url(#dpGold)"/>
    <!-- Cheese drips -->
    <circle cx="20" cy="26" r="2.2" fill="#FAF3E0"/>
    <circle cx="27" cy="29" r="1.8" fill="#FAF3E0"/>
    <circle cx="24" cy="20" r="1.4" fill="#FAF3E0"/>
    <!-- Pepperoni -->
    <circle cx="19" cy="32" r="1.4" fill="#D62828"/>
    <circle cx="29" cy="32" r="1.2" fill="#D62828"/>
    <!-- Basil leaf top -->
    <path d="M24 4 C 22 6, 22 8, 24 9 C 26 8, 26 6, 24 4 Z" fill="#3A7D44"/>
  </g>
  <!-- Wordmark -->
  <text x="62" y="35" font-family="Arial Black, 'Arial', sans-serif" font-size="26" font-weight="900" fill="url(#dpPink)" letter-spacing="-0.5">DEMO'S</text>
  <text x="178" y="35" font-family="Arial Black, 'Arial', sans-serif" font-size="26" font-weight="900" fill="url(#dpGold)" letter-spacing="-0.5">PIZZA</text>
  <!-- Tagline -->
  <text x="62" y="52" font-family="Arial, sans-serif" font-size="9" font-weight="600" fill="#FFD700" letter-spacing="2.5" opacity="0.9">TAZE MALZEME · EL YAPIMI HAMUR</text>
</svg>
