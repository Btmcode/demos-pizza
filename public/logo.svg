<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 64" role="img" aria-label="Demos Pizza">
  <defs>
    <linearGradient id="dpFlame" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F77F00"/>
      <stop offset="100%" stop-color="#D62828"/>
    </linearGradient>
    <linearGradient id="dpSlice" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FAF3E0"/>
      <stop offset="100%" stop-color="#F4E4BC"/>
    </linearGradient>
  </defs>
  <!-- Emblem: pizza slice formed by flame, inside circle -->
  <g transform="translate(8,8)">
    <circle cx="24" cy="24" r="24" fill="#1A1410"/>
    <circle cx="24" cy="24" r="23" fill="none" stroke="#F77F00" stroke-width="1.5"/>
    <!-- Pizza slice / flame shape -->
    <path d="M24 8 C 18 18, 14 24, 14 30 C 14 38, 19 44, 24 44 C 29 44, 34 38, 34 30 C 34 24, 30 18, 24 8 Z" fill="url(#dpFlame)"/>
    <!-- Melted cheese dot -->
    <circle cx="21" cy="28" r="2.4" fill="#FAF3E0" opacity="0.9"/>
    <circle cx="27" cy="32" r="2" fill="#FAF3E0" opacity="0.8"/>
    <circle cx="24" cy="22" r="1.6" fill="#FAF3E0" opacity="0.7"/>
    <!-- Basil leaf -->
    <path d="M24 14 C 22 16, 22 18, 24 19 C 26 18, 26 16, 24 14 Z" fill="#3A7D44"/>
  </g>
  <!-- Wordmark -->
  <text x="62" y="34" font-family="Georgia, 'Times New Roman', serif" font-size="26" font-weight="700" fill="#1A1410" letter-spacing="-0.5">DEMOS</text>
  <text x="62" y="52" font-family="Arial, sans-serif" font-size="12" font-weight="600" fill="#D62828" letter-spacing="3.5">PIZZA · FİRİN</text>
</svg>
